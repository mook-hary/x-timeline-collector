# Deploy curated site/ to GitHub Pages.
# Secrets are not required. Uses GitHub-native Pages actions.
#
# Security model (EP-018):
# - Deploy only reviewed files already present under site/
# - Do not read output/, runs/, timeline dumps, or browser data
# - Do not rebuild from private local intermediates in CI

name: Deploy Personal Timeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate curated site/
        run: |
          set -euo pipefail
          test -d site
          test -f site/index.html
          test -f site/manifest.webmanifest
          test -f site/favicon.ico
          # Reject private artifacts accidentally placed under site/
          if [ -e site/.env ] || [ -e site/output ] || [ -e site/runs ]; then
            echo "::error::Forbidden private paths found under site/"
            exit 1
          fi
          if find site -type l | grep -q .; then
            echo "::error::Symlinks are not allowed under site/"
            find site -type l
            exit 1
          fi
          if find site -type f \( \
              -name 'timeline.json' -o -name 'timeline.csv' -o \
              -name 'timeline_analyzed.json' -o -name 'timeline_enriched.json' -o \
              -name '.env' \
            \) | grep -q .; then
            echo "::error::Forbidden raw/private files found under site/"
            exit 1
          fi
          node scripts/validate-site.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
